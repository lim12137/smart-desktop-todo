name: Build Claude Code Offline Updater

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check latest version
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/anthropics/claude-code/releases/latest' -Headers @{ 'User-Agent' = 'claude-updater' }
          $latestTag = $release.tag_name
          $latestVer = $latestTag.TrimStart('v')
          "LATEST_VERSION=$latestVer" >> $env:GITHUB_ENV
          "LATEST_TAG=$latestTag" >> $env:GITHUB_ENV

          $winAsset = $release.assets | Where-Object { $_.name -eq 'claude-win32-x64.zip' }
          $sumsAsset = $release.assets | Where-Object { $_.name -eq 'SHASUMS256.txt' }

          if (-not $winAsset) { Write-Error "claude-win32-x64.zip not found"; exit 1 }

          "WIN_URL=$($winAsset.browser_download_url)" >> $env:GITHUB_ENV
          "SUMS_URL=$($sumsAsset.browser_download_url)" >> $env:GITHUB_ENV
          Write-Host "Latest version: $latestVer"

      - name: Check if updater already exists
        shell: pwsh
        run: |
          $headers = @{ 'User-Agent' = 'claude-updater' }
          try {
            Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${env:LATEST_VERSION}-updater" -Headers $headers -ErrorAction Stop | Out-Null
            Write-Host "Updater for v${env:LATEST_VERSION} already exists, skipping."
            "SKIP_BUILD=true" >> $env:GITHUB_ENV
          } catch {
            Write-Host "No existing updater, will build."
            "SKIP_BUILD=false" >> $env:GITHUB_ENV
          }

      - name: Download and verify
        if: env.SKIP_BUILD == 'false'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:WIN_URL -OutFile claude-win32-x64.zip
          if ($env:SUMS_URL) {
            Invoke-WebRequest -Uri $env:SUMS_URL -OutFile SHASUMS256.txt
            $expectedLine = Get-Content SHASUMS256.txt | Where-Object { $_ -match 'claude-win32-x64.zip$' }
            if ($expectedLine) {
              $expectedHash = ($expectedLine -split '\s+')[0].ToLower()
              $actualHash = (Get-FileHash -Algorithm SHA256 claude-win32-x64.zip).Hash.ToLower()
              Write-Host "Expected: $expectedHash"
              Write-Host "Actual:   $actualHash"
              if ($expectedHash -ne $actualHash) { Write-Error "SHA256 mismatch!"; exit 1 }
              Write-Host "SHA256 verified OK"
            }
          }

      - name: Build SFX updater exe
        if: env.SKIP_BUILD == 'false'
        shell: pwsh
        run: |
          # Install 7-Zip
          choco install 7zip -y --no-progress
          $sevenZip = "C:\Program Files\7-Zip\7z.exe"

          # Download 7-Zip SFX module
          Invoke-WebRequest -Uri "https://www.7-zip.org/a/7z2301-extra.7z" -OutFile 7z-extra.7z
          & $sevenZip x 7z-extra.7z -o7z-extra -y

          # List extracted files to find the correct SFX module
          Write-Host "Files in 7z-extra:"
          Get-ChildItem -Path 7z-extra -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }

          # Find SFX module - prefer 7z.sfx, fallback to first .sfx found
          $sfxModule = Get-ChildItem -Path 7z-extra -Filter "*.sfx" | Select-Object -First 1
          if (-not $sfxModule) { Write-Error "No .sfx file found in 7z-extra!"; exit 1 }
          Write-Host "Using SFX module: $($sfxModule.FullName)"

          # Create staging dir
          New-Item -ItemType Directory -Path staging -Force

          # Extract claude exe from zip
          Expand-Archive -Path claude-win32-x64.zip -DestinationPath staging -Force

          # Create install.bat
          $batContent = @'
          @echo off
          setlocal enabledelayedexpansion
          title Claude Code Offline Updater
          echo ============================================
          echo   Claude Code Offline Updater
          echo ============================================
          echo.
          set "INSTALL_DIR=%USERPROFILE%\.local\bin"
          if not "%~1"=="" set "INSTALL_DIR=%~1"
          echo Install to: %INSTALL_DIR%
          echo.
          tasklist /FI "IMAGENAME eq claude.exe" 2>NUL | find /I "claude.exe" >NUL
          if !errorlevel! equ 0 (
              echo Stopping running claude.exe ...
              taskkill /F /IM claude.exe >NUL 2>&1
              timeout /t 2 /nobreak >NUL
          )
          if not exist "%INSTALL_DIR%" mkdir "%INSTALL_DIR%"
          if exist "%INSTALL_DIR%\claude.exe" (
              echo Backing up old version...
              copy /Y "%INSTALL_DIR%\claude.exe" "%INSTALL_DIR%\claude.exe.bak" >NUL
          )
          echo Installing new version...
          copy /Y "%~dp0claude.exe" "%INSTALL_DIR%\claude.exe" >NUL 2>&1
          if !errorlevel! neq 0 (
              echo ERROR: Copy failed! Restoring backup...
              if exist "%INSTALL_DIR%\claude.exe.bak" copy /Y "%INSTALL_DIR%\claude.exe.bak" "%INSTALL_DIR%\claude.exe" >NUL
              pause
              exit /b 1
          )
          echo.
          if exist "%INSTALL_DIR%\claude.exe" (
              echo ============================================
              for /f "tokens=*" %%v in ('"%INSTALL_DIR%\claude.exe" --version 2^>NUL') do set "VER=%%v"
              echo   Success! Version: !VER!
              echo   Path: %INSTALL_DIR%\claude.exe
              echo ============================================
          ) else (
              echo ERROR: claude.exe not found after install
          )
          echo.
          pause
          '@
          Set-Content -Path staging\install.bat -Value $batContent -Encoding ASCII

          # Create SFX config
          $sfxConfig = @"
          ;!@Install@!UTF-8!
          Title="Claude Code $env:LATEST_VERSION Offline Updater"
          BeginPrompt="Update Claude Code to $env:LATEST_VERSION ?"
          RunProgram="install.bat"
          ;!@InstallEnd@!
          "@
          Set-Content -Path sfx_config.txt -Value $sfxConfig -Encoding ASCII

          # Build 7z archive
          & $sevenZip a -t7z payload.7z .\staging\* -mx5

          # Combine SFX module + config + archive into exe
          $output = "claude-code-${env:LATEST_VERSION}-win-x64-updater.exe"
          $bytes = [System.IO.File]::ReadAllBytes($sfxModule.FullName) + [System.IO.File]::ReadAllBytes("sfx_config.txt") + [System.IO.File]::ReadAllBytes("payload.7z")
          [System.IO.File]::WriteAllBytes($output, $bytes)

          $size = (Get-Item $output).Length / 1MB
          Write-Host "Built: $output ($([math]::Round($size,1)) MB)"

          "UPDATER_EXE=$output" >> $env:GITHUB_ENV

      - name: Create Release
        if: env.SKIP_BUILD == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${env:LATEST_VERSION}-updater"
          $title = "Claude Code ${env:LATEST_VERSION} Offline Updater (Win x64)"
          $notes = @"
          ## Claude Code ${env:LATEST_VERSION} Offline Updater (Windows x64)

          ### Usage
          1. Download ``claude-code-${env:LATEST_VERSION}-win-x64-updater.exe``
          2. Double-click to run
          3. Confirm the prompt - update completes automatically
          4. Installed to ``%USERPROFILE%\.local\bin\claude.exe``

          ### Contents
          - claude.exe v${env:LATEST_VERSION} (SHA256 verified)
          - Built: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
          "@

          gh release create $tag $env:UPDATER_EXE --repo $env:GITHUB_REPOSITORY --title $title --notes $notes
          Write-Host "Release created: $tag"

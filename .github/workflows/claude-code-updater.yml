name: Build Claude Code Offline Updater

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check latest version
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/anthropics/claude-code/releases/latest' -Headers @{ 'User-Agent' = 'claude-updater' }
          $latestTag = $release.tag_name
          $latestVer = $latestTag.TrimStart('v')
          "LATEST_VERSION=$latestVer" >> $env:GITHUB_ENV
          "LATEST_TAG=$latestTag" >> $env:GITHUB_ENV

          $winAsset = $release.assets | Where-Object { $_.name -eq 'claude-win32-x64.zip' }
          $sumsAsset = $release.assets | Where-Object { $_.name -eq 'SHASUMS256.txt' }

          if (-not $winAsset) { Write-Error "claude-win32-x64.zip not found"; exit 1 }

          "WIN_URL=$($winAsset.browser_download_url)" >> $env:GITHUB_ENV
          "SUMS_URL=$($sumsAsset.browser_download_url)" >> $env:GITHUB_ENV
          Write-Host "Latest version: $latestVer"

      - name: Check if updater already exists
        shell: pwsh
        run: |
          $headers = @{ 'User-Agent' = 'claude-updater' }
          try {
            Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${env:LATEST_VERSION}-updater" -Headers $headers -ErrorAction Stop | Out-Null
            Write-Host "Updater for v${env:LATEST_VERSION} already exists, skipping."
            "SKIP_BUILD=true" >> $env:GITHUB_ENV
          } catch {
            Write-Host "No existing updater, will build."
            "SKIP_BUILD=false" >> $env:GITHUB_ENV
          }

      - name: Download and verify
        if: env.SKIP_BUILD == 'false'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:WIN_URL -OutFile claude-win32-x64.zip
          if ($env:SUMS_URL) {
            Invoke-WebRequest -Uri $env:SUMS_URL -OutFile SHASUMS256.txt
            $expectedLine = Get-Content SHASUMS256.txt | Where-Object { $_ -match 'claude-win32-x64.zip$' }
            if ($expectedLine) {
              $expectedHash = ($expectedLine -split '\s+')[0].ToLower()
              $actualHash = (Get-FileHash -Algorithm SHA256 claude-win32-x64.zip).Hash.ToLower()
              Write-Host "Expected: $expectedHash"
              Write-Host "Actual:   $actualHash"
              if ($expectedHash -ne $actualHash) { Write-Error "SHA256 mismatch!"; exit 1 }
              Write-Host "SHA256 verified OK"
            }
          }

      - name: Build self-extracting exe
        if: env.SKIP_BUILD == 'false'
        shell: pwsh
        run: |
          # Create staging dir
          New-Item -ItemType Directory -Path staging -Force

          # Extract claude exe from zip
          Expand-Archive -Path claude-win32-x64.zip -DestinationPath staging -Force
          Write-Host "Extracted files:"
          Get-ChildItem staging | ForEach-Object { Write-Host "  $($_.Name) ($([math]::Round($_.Length/1MB,1)) MB)" }

          # Compress staging into a zip for embedding
          Compress-Archive -Path staging\* -DestinationPath payload.zip -Force

          # Read the zip as base64 for embedding
          $zipBytes = [System.IO.File]::ReadAllBytes("payload.zip")
          $b64 = [Convert]::ToBase64String($zipBytes)
          $ver = $env:LATEST_VERSION
          Write-Host "Payload size: $([math]::Round($zipBytes.Length/1MB,1)) MB, base64 length: $($b64.Length)"

          # Write C# installer source
          $installerCs = @"
          using System;
          using System.IO;
          using System.IO.Compression;
          using System.Diagnostics;
          using System.Reflection;
          using System.Text;

          [assembly: AssemblyTitle("Claude Code Updater v$ver")]
          [assembly: AssemblyProduct("Claude Code Offline Updater")]
          [assembly: AssemblyVersion("$ver.0")]

          namespace ClaudeUpdater
          {
              class Program
              {
                  static void Main(string[] args)
                  {
                      var installDir = Path.Combine(Environment.GetFolderPath(Environment.SpecialFolder.UserProfile), ".local", "bin");
                      if (args.Length > 0) installDir = args[0];

                      Console.WriteLine("============================================");
                      Console.WriteLine("  Claude Code $ver Offline Updater");
                      Console.WriteLine("============================================");
                      Console.WriteLine();
                      Console.WriteLine("Install to: " + installDir);
                      Console.WriteLine();

                      // Kill running claude
                      try
                      {
                          foreach (var proc in Process.GetProcessesByName("claude"))
                          {
                              Console.WriteLine("Stopping claude.exe (PID " + proc.Id + ")...");
                              proc.Kill();
                              proc.WaitForExit(3000);
                          }
                      }
                      catch { }

                      // Extract embedded zip
                      string tempDir = Path.Combine(Path.GetTempPath(), "claude_update_" + Process.GetCurrentProcess().Id);
                      try
                      {
                          Directory.CreateDirectory(tempDir);

                          // Decode the embedded payload
                          var asm = Assembly.GetExecutingAssembly();
                          var resName = asm.GetName().Name + ".payload.b64";
                          using (var stream = asm.GetManifestResourceStream(resName))
                          {
                              if (stream == null)
                              {
                                  Console.WriteLine("[ERROR] Embedded payload not found!");
                                  Console.ReadKey();
                                  return;
                              }
                              using (var reader = new StreamReader(stream, Encoding.ASCII))
                              {
                                  string b64 = reader.ReadToEnd();
                                  byte[] zipBytes = Convert.FromBase64String(b64);
                                  string zipPath = Path.Combine(tempDir, "payload.zip");
                                  File.WriteAllBytes(zipPath, zipBytes);
                                  ZipFile.ExtractToDirectory(zipPath, tempDir);
                              }
                          }

                          // Ensure install dir exists
                          Directory.CreateDirectory(installDir);

                          // Backup old version
                          string exePath = Path.Combine(installDir, "claude.exe");
                          if (File.Exists(exePath))
                          {
                              Console.WriteLine("Backing up old version...");
                              File.Copy(exePath, exePath + ".bak", true);
                          }

                          // Copy new exe
                          Console.WriteLine("Installing new version...");
                          string srcExe = Path.Combine(tempDir, "claude.exe");
                          if (!File.Exists(srcExe))
                          {
                              Console.WriteLine("[ERROR] claude.exe not found in package!");
                              Console.ReadKey();
                              return;
                          }
                          File.Copy(srcExe, exePath, true);

                          // Verify
                          if (File.Exists(exePath))
                          {
                              Console.WriteLine();
                              Console.WriteLine("============================================");
                              try
                              {
                                  var p = Process.Start(new ProcessStartInfo(exePath, "--version") { RedirectStandardOutput = true, UseShellExecute = false, CreateNoWindow = true });
                                  string v = p.StandardOutput.ReadLine() ?? "";
                                  p.WaitForExit(5000);
                                  Console.WriteLine("  Success! " + v);
                              }
                              catch
                              {
                                  Console.WriteLine("  Installed successfully!");
                              }
                              Console.WriteLine("  Path: " + exePath);
                              Console.WriteLine("============================================");
                          }
                      }
                      catch (Exception ex)
                      {
                          Console.WriteLine("[ERROR] " + ex.Message);
                          // Try restore backup
                          string exePath = Path.Combine(installDir, "claude.exe");
                          string bakPath = exePath + ".bak";
                          if (File.Exists(bakPath))
                          {
                              Console.WriteLine("Restoring backup...");
                              File.Copy(bakPath, exePath, true);
                          }
                      }
                      finally
                      {
                          // Cleanup
                          try { Directory.Delete(tempDir, true); } catch { }
                      }

                      Console.WriteLine();
                      Console.WriteLine("Press any key to exit...");
                      Console.ReadKey();
                  }
              }
          }
          "@

          Set-Content -Path installer.cs -Value $installerCs -Encoding UTF8

          # Write base64 payload as embedded resource
          New-Item -ItemType Directory -Path resources -Force
          Set-Content -Path "resources\payload.b64" -Value $b64 -Encoding ASCII -NoNewline

          # Create csproj for single-file exe
          $csproj = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <AssemblyName>claude-code-updater</AssemblyName>
              <PublishSingleFile>true</PublishSingleFile>
              <SelfContained>false</SelfContained>
              <IncludeNativeLibrariesForSelfExtract>true</IncludeNativeLibrariesForSelfExtract>
              <EnableCompressionInSingleFile>true</EnableCompressionInSingleFile>
              <GenerateAssemblyInfo>false</GenerateAssemblyInfo>
              <RuntimeIdentifier>win-x64</RuntimeIdentifier>
            </PropertyGroup>
            <ItemGroup>
              <EmbeddedResource Include="resources\payload.b64" />
            </ItemGroup>
          </Project>
          "@
          Set-Content -Path updater.csproj -Value $csproj -Encoding UTF8

          # Publish single-file exe
          dotnet publish updater.csproj -c Release -r win-x64 -o publish /p:PublishSingleFile=true /p:SelfContained=false

          $output = "claude-code-${ver}-win-x64-updater.exe"
          Copy-Item "publish\claude-code-updater.exe" $output

          $size = (Get-Item $output).Length / 1MB
          Write-Host "Built: $output ($([math]::Round($size,1)) MB)"

          "UPDATER_EXE=$output" >> $env:GITHUB_ENV

      - name: Create Release
        if: env.SKIP_BUILD == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${env:LATEST_VERSION}-updater"
          $title = "Claude Code ${env:LATEST_VERSION} Offline Updater (Win x64)"
          $notes = @"
          ## Claude Code ${env:LATEST_VERSION} Offline Updater (Windows x64)

          ### Usage
          1. Download ``claude-code-${env:LATEST_VERSION}-win-x64-updater.exe``
          2. Double-click to run
          3. Update completes automatically
          4. Installed to ``%USERPROFILE%\.local\bin\claude.exe``

          Requires .NET 8.0 runtime (usually pre-installed on Windows).

          ### Contents
          - claude.exe v${env:LATEST_VERSION} (SHA256 verified)
          - Built: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
          "@

          gh release create $tag $env:UPDATER_EXE --repo $env:GITHUB_REPOSITORY --title $title --notes $notes
          Write-Host "Release created: $tag"
